<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Completed Spot Inspections</title>
    <link rel="stylesheet" href="styles.css?v=20260526-2" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Archive</p>
        <h1>Completed Spot Inspections</h1>
      </div>
      <div class="header-actions">
        <a class="header-link" href="index.html">Back to Builder</a>
        <button class="primary-button" id="refreshLibrary" type="button">Refresh</button>
      </div>
    </header>

    <main class="library-page">
      <section class="form-section">
        <div class="section-heading split-heading">
          <div>
            <p class="eyebrow">Shared Library</p>
            <h2>Filter and Review</h2>
          </div>
          <p class="library-status" id="libraryStatus">Loading inspections...</p>
        </div>

        <div class="library-toolbar">
          <label>
            <span>Filter by Unit</span>
            <select id="libraryUnitFilter">
              <option value="">All units</option>
            </select>
          </label>
          <label>
            <span>Search</span>
            <input id="librarySearch" type="search" placeholder="Search unit, area, discipline, inspector, or finding" />
          </label>
          <div class="library-toolbar-actions">
            <p id="libraryCount">0 inspections</p>
            <button class="secondary-button" id="exportCsv" type="button">Export CSV</button>
          </div>
        </div>

        <div class="library-list" id="libraryList"></div>
      </section>

      <section class="report-panel" aria-label="Inspection report">
        <div class="section-heading">
          <p class="eyebrow">Selected Record</p>
          <h2>Report Preview</h2>
        </div>
        <article id="libraryReportPreview" class="report-preview">
          <p>Select a completed inspection to preview it here.</p>
        </article>
      </section>

      <section class="report-panel follow-up-editor" id="followUpEditor" aria-label="Follow-up update" hidden>
        <div class="section-heading split-heading">
          <div>
            <p class="eyebrow">30-Day Update</p>
            <h2 id="followUpEditorTitle">Update Follow-up</h2>
          </div>
          <button class="secondary-button" id="cancelFollowUpEdit" type="button">Cancel</button>
        </div>
        <form id="followUpForm">
          <div class="question-grid">
            <label>
              <span>Reviewer</span>
              <input id="followUpReviewer" name="followUpReviewer" type="text" placeholder="Enter reviewer name" />
            </label>
            <label>
              <span>Review Date</span>
              <input id="followUpReviewDate" name="followUpReviewDate" type="date" />
            </label>
          </div>
          <label>
            <span>Follow-up log / 30-day updates</span>
            <textarea id="followUpLogEdit" name="followUpLogEdit" rows="5" placeholder="Document 30-day follow-up actions, status, and any closure details."></textarea>
          </label>
          <div class="modal-actions">
            <button class="primary-button" id="saveFollowUpEdit" type="submit">Save Follow-up</button>
          </div>
        </form>
      </section>
    </main>

    <script>
      window.SPOT_INSPECTION_API_URL = "https://spot-inspections-air-force.onrender.com";
    </script>
    <script src="library.js?v=20260526-4"></script>
  </body>
</html>
